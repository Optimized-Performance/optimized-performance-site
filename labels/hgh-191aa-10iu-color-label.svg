  <text x="128" y="176" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#7BA3C4" opacity="0.5">Lot: __________</text>
  <text x="420" y="176" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="400" fill="#7BA3C4" opacity="0.4">OP-HGH-10IU | 2 mL vial</text>
