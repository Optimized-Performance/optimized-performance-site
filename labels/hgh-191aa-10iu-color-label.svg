  <text x="128" y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#90CAF9" letter-spacing="0.5">Somatropin 191AA</text>

  <!-- Dosage + format -->
  <text x="128" y="104" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#00B4D8" letter-spacing="0.5">10 IU</text>
  <text x="178" y="104" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#7BA3C4">Lyophilized Powder</text>

