<svg xmlns="http://www.w3.org/2000/svg" width="2.25in" height="1.25in" viewBox="0 0 648 360">
  <!-- Dark navy background w/ thin cyan inset frame -->
  <rect x="0" y="0" width="648" height="360" rx="10" fill="#0D1B2A"/>
  <rect x="3" y="3" width="642" height="354" rx="8" fill="none" stroke="#00B4D8" stroke-width="1.2" opacity="0.4"/>

  <!-- Left brand column divider -->
  <line x1="160" y1="24" x2="160" y2="336" stroke="#00B4D8" stroke-width="0.9" opacity="0.25"/>

  <!-- Mandala logo (scaled ~1.5x from peptide label) -->
  <g transform="translate(80, 120)">
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="none" stroke="#00B4D8" stroke-width="1.4" opacity="0.25"/>
    <polygon points="0,-28.6 24.8,-14.3 24.8,14.3 0,28.6 -24.8,14.3 -24.8,-14.3" fill="none" stroke="#00B4D8" stroke-width="1.4" opacity="0.5"/>
    <polygon points="0,-15.4 13.4,-7.7 13.4,7.7 0,15.4 -13.4,7.7 -13.4,-7.7" fill="none" stroke="#00B4D8" stroke-width="1.7" opacity="0.8"/>
    <circle cx="0" cy="-44" r="3.2" fill="#00B4D8" opacity="0.6"/>
    <circle cx="38" cy="-22" r="3.2" fill="#00B4D8" opacity="0.5"/>
    <circle cx="38" cy="22" r="3.2" fill="#0077B6" opacity="0.5"/>
    <circle cx="0" cy="44" r="3.2" fill="#0077B6" opacity="0.6"/>
    <circle cx="-38" cy="22" r="3.2" fill="#0077B6" opacity="0.5"/>
    <circle cx="-38" cy="-22" r="3.2" fill="#00B4D8" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#00B4D8"/>
    <circle cx="0" cy="0" r="2.6" fill="#0D1B2A"/>
    <polygon points="0,-38 9,-28 -9,-28" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.6"/>
    <polygon points="0,38 9,28 -9,28" fill="none" stroke="#0077B6" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Brand text (no "PEPTIDES", no "RESEARCH") -->
  <text x="80" y="208" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="2.2">OPTIMIZED</text>
  <text x="80" y="226" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#90CAF9" letter-spacing="2.8">PERFORMANCE</text>

  <!-- Product name + descriptor -->
  <text x="184" y="68" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" letter-spacing="1.5">Tadalafil</text>
  <line x1="184" y1="80" x2="500" y2="80" stroke="#00B4D8" stroke-width="2" opacity="0.6"/>
  <text x="184" y="104" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#90CAF9" letter-spacing="1">PDE5 Inhibitor · Oral Solution</text>

  <!-- Concentration band (highlighted — most important customer-facing number) -->
  <rect x="184" y="120" width="320" height="38" rx="4" fill="#00B4D8" opacity="0.18"/>
  <rect x="184" y="120" width="320" height="38" rx="4" fill="none" stroke="#00B4D8" stroke-width="1" opacity="0.7"/>
  <text x="200" y="146" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="#00B4D8" letter-spacing="0.8">20 mg/mL</text>
  <text x="350" y="146" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" opacity="0.85">600 mg · 30 mL</text>

  <!-- Storage line -->
  <text x="184" y="184" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" fill="#7BA3C4" letter-spacing="0.3">Store at room temperature · Keep sealed · Avoid heat &amp; light</text>

  <!-- Divider -->
  <line x1="184" y1="200" x2="636" y2="200" stroke="#00B4D8" stroke-width="0.6" opacity="0.25"/>

  <!-- RUO header (red, high contrast — same treatment as peptide labels) -->
  <text x="184" y="222" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#FF4D6D" letter-spacing="1">FOR RESEARCH USE ONLY</text>
  <text x="184" y="240" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="#FF8FA3" letter-spacing="0.3">Not for human consumption. Not a drug, food, or cosmetic.</text>

  <!-- Lot / MFG / EXP stamp area -->
  <text x="184" y="278" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#7BA3C4" opacity="0.65">Lot: ___________</text>
  <text x="324" y="278" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#7BA3C4" opacity="0.65">MFG: ___________</text>
  <text x="476" y="278" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#7BA3C4" opacity="0.65">EXP: ___________</text>

  <!-- Footer: website + SKU -->
  <text x="184" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" fill="#90CAF9" opacity="0.75" letter-spacing="0.4">optimizedperformancepeptides.com</text>
  <text x="636" y="316" text-anchor="end" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" fill="#7BA3C4" opacity="0.7">OP-TAD-20MG · 30 mL Dropper Bottle</text>
</svg>